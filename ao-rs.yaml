port: 3000
defaults:
  runtime: tmux
  agent: cursor
  orchestrator:
    agent: cursor
    agent_config:
      permissions: permissionless
  worker:
    agent: cursor
  orchestrator_rules: |-
    You are the orchestrator session.

    Non-negotiable rules:
    - The orchestrator session is read-only. Do not edit repo files or implement code changes here.
    - Delegate all implementation work to worker sessions.
    - Prefer using `ao-rs` commands (especially `ao-rs send`) to coordinate; do not use raw tmux commands.
    - When spawned from an issue, turn the issue into a clear plan, then spawn/drive workers to implement it.

    Workflow (dev lifecycle):
    1. UNDERSTAND
    2. PLAN
    3. IMPLEMENT (delegate)
    4. VERIFY (delegate)
    5. REVIEW
    6. DELIVER (delegate PR work to workers)
  workspace: worktree
  tracker: github
  notifiers: []
projects:
  ao-rs:
    repo: duonghb53/ao-rs
    path: /Users/haduong/study/ao-rs
    default_branch: main
    agent_config:
      permissions: permissionless
      rules: |-
        Branch naming:
        - Use: <type>/<issue>-<slug>
        - Allowed types: feat/, fix/, hotfix/, refactor/, chore/, docs/, test/
        - Slug = kebab-case from GitHub issue title
        - Default type if unclear: feature/
        - Do not create additional branches unless asked.
        - Source to porting: ~study/agent-orchestrator
        - Always check logic from agent-orchestrator logic when impl feature, or porting code
        - When spawned from an issue, use the dev-lifecycle workflow to turn the issue content into concrete requirements and a plan, then execute it.
        - If stuck for more than 5 minutes, explain what's blocking you.
  golf-coach-assistant:
    repo: speedrun-labs/golf-coach-assistant
    path: /Users/haduong/work/tentou/golf-coach-assistant
    agent: cursor
    agent_config:
      permissions: permissionless
      rules: |-
        Branch naming:
        - Use: <type>/<issue>-<slug>
        - Allowed types: feat/, fix/, hotfix/, refactor/, chore/, docs/, test/
        - Slug = kebab-case from GitHub issue title
        - Default type if unclear: feature/
        - Do not create additional branches unless asked.
    default_branch: main
    orchestrator_rules: |-
      You are the orchestrator for golf-coach-assistant.
      Delegate implementation to workers.
reactions:
  approved-and-green:
    action: send-to-agent
    message: PR had been, please check.
    priority: urgent
  merge-conflicts:
    action: send-to-agent
    message: Your branch has merge conflicts. Rebase on the default branch and resolve them.
    priority: action
    escalate_after: 15m
  agent-idle:
    action: send-to-agent
    message: You appear to be idle. If your task is not complete, continue working or explain blockers.
    priority: info
    retries: 2
    escalate_after: 15m
  agent-needs-input:
    action: notify
    priority: urgent
  agent-stuck:
    action: send-to-agent
    message: "You appear stuck. Continue work or explain blockers."
    threshold: 10m
    retries: 2
    escalate_after: 15m
  changes-requested:
    action: send-to-agent
    message: There are review comments on your PR. Check with `gh pr view --comments`, address them, and push.
    priority: action
    escalate_after: 30m
  agent-exited:
    action: notify
    priority: urgent
  all-complete:
    action: notify
    priority: info
    include_summary: true
notification_routing:
  urgent:
    - stdout
  info:
    - stdout
  warning:
    - stdout
  action:
    - stdout
