port: 3000
defaults:
  runtime: tmux
  agent: cursor
  # Single source of truth for the orchestrator model. Every project's
  # orchestrator inherits this unless the project sets its own override.
  orchestrator:
    agent: claude-code
    agent_config:
      permissions: permissionless
      model: opus
  worker:
    agent: cursor
  orchestrator_rules: |-
    After spawning a worker, do NOT stop. Run a monitoring loop:
    1. Immediately confirm spawn with: ao-rs status
    2. Every 5 minutes, check: ao-rs status --project <id>
    3. When worker reaches pr_open/review_pending/merged/ci_failed → act
    4. Only stop monitoring when all workers reach terminal state (merged/killed)

    NEVER call `ao-rs cleanup` — it permanently archives sessions off-disk, making them
    invisible in the dashboard. Merged/killed sessions must remain visible so the user can
    review them. Only the user decides when to archive.

    When sessions are merged/killed, remove their worktrees with `ao-rs prune`:
      ao-rs prune --dry-run   # preview which worktrees would be removed
      ao-rs prune             # remove worktrees (sessions stay visible in dashboard)

    When writing tests (and when instructing workers to write tests):
    - Check the README or package manifest for the project's test command first.
      Common: `npm test`, `pytest`, `go test ./...`, `cargo t`, `make test`.
    - Co-locate tests with the code they cover where the framework supports it.
    - Run only the relevant tests during development — not the full suite every change.
    - Never write tests for things the type system or compiler already guarantees.
  workspace: worktree
  tracker: github
  notifiers:
    - discord

projects:
  ao-rs:
    repo: duonghb53/ao-rs
    path: /Users/haduong/study/ao-rs
    default_branch: main
    agent: claude-code
    agent_config:
      permissions: permissionless
      model: sonnet                 # Worker model for ao-rs
      # Orchestrator model inherited from defaults.orchestrator.agent_config.model (opus)
      rules: |-
        - Source porting from: ~study/agent-orchestrator, please refer from it.
        - Always check logic from agent-orchestrator logic when impl feature, or porting code.
        - When spawned from an issue, use the dev-lifecycle workflow to turn the issue content into concrete requirements and a plan, then execute it.
        - If stuck for more than 5 minutes, explain what's blocking you.

        Testing rules (strict — follow exactly):
        - Use `cargo t` (nextest alias) — NOT `cargo test`. Nextest is parallel/isolated and much faster.
        - Run `cargo test --doc` separately for doctests (nextest skips them).
        - Tests MUST be inline `#[cfg(test)] mod tests` at the bottom of the SAME file you changed.
          Example: editing `crates/ao-core/src/lifecycle/tick.rs` → add tests to `lifecycle/tick.rs`.
        - Do NOT create a new `tests/` integration file for a single-module change.
        - Run only your module's tests during development: `cargo t -p ao-core lifecycle::tick`
        - Test scope = only the public interface of what you changed. Do not test compiler guarantees
          (type safety, exhaustive match, borrow rules — the compiler already proves these).
        - Before opening a PR: `cargo t --workspace && cargo test --doc --workspace &&
          cargo clippy --workspace --all-targets -- -D warnings && cargo fmt --all -- --check`
  golf-coach-assistant:
    repo: speedrun-labs/golf-coach-assistant
    path: /Users/haduong/work/tentou/golf-coach-assistant
    agent: cursor
    agent_config:
      permissions: permissionless
    default_branch: main
    orchestrator_rules: |-
      You are the orchestrator for golf-coach-assistant.
      Delegate implementation to workers.

      Testing rules for workers:
      - Check the README or package.json scripts for the test command (likely `npm test` or `pnpm test`).
      - Run only tests related to the changed module during development.
      - Fix all test failures before opening a PR.
notifiers:
  discord:
    webhookUrl: 

reactions:
  approved-and-green:
    action: notify
    priority: urgent
  merge-conflicts:
    action: send-to-agent
    message: Your branch has merge conflicts. Rebase on the default branch and resolve them.
    priority: action
    escalate_after: 15m
  agent-idle:
    action: send-to-agent
    message: You appear to be idle. If your task is not complete, continue working or explain blockers.
    priority: info
    retries: 2
    escalate_after: 15m
  agent-needs-input:
    action: notify
    priority: urgent
  agent-stuck:
    action: send-to-agent
    message: "You appear stuck. Continue work or explain blockers."
    threshold: 10m
    retries: 2
    escalate_after: 15m
  changes-requested:
    action: send-to-agent
    message: There are review comments on your PR. Check with `gh pr view --comments`, address them, and push.
    priority: action
    escalate_after: 30m
  agent-exited:
    action: notify
    priority: urgent
  all-complete:
    action: notify
    priority: info
    include_summary: true
notification_routing:
  urgent:
    - discord
    - stdout
  action:
    - discord
    - stdout
  info:
    - stdout
  warning:
    - stdout
